name: Feature request
description: Suggest a new feature or improvement for Ryn
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea. Please search the
        [existing issues](https://github.com/Yupmoh/Ryn/issues?q=is%3Aissue)
        first to see if it has already been proposed.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? Is your request related to a frustration or limitation?
      placeholder: I'm always frustrated when ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you have considered.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Ryn does this relate to?
      options:
        - Core (window, webview, app lifecycle)
        - IPC and source generator
        - Plugins
        - CLI tooling
        - Documentation
        - Other / not sure
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or examples about the feature request here.
    validations:
      required: false
