# TST-11: Dependabot keeps both dependency ecosystems current so the SHA-pinned actions and the
# NuGet graph don't silently age. The github-actions ecosystem is what refreshes the pins: when a
# pinned action ships a new release, Dependabot opens a PR bumping the SHA AND its `# vX.Y.Z` comment,
# which the build.yml pin-check then re-validates. The nuget ecosystem (repo root) covers the managed
# package graph (central package management via Directory.Packages.props).
version: 2
updates:
  # Keep the SHA-pinned GitHub Actions fresh. Dependabot understands `uses: owner/repo@<sha> # vX.Y.Z`
  # and bumps both the SHA and the trailing version comment together.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
    labels:
      - dependencies
      - github-actions
    groups:
      # Batch action bumps into a single PR per week to cut review churn.
      actions:
        patterns:
          - "*"

  # Managed NuGet dependencies. Central package management means every version lives in
  # Directory.Packages.props; Dependabot updates those <PackageVersion> entries.
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
    labels:
      - dependencies
      - nuget
    groups:
      # One PR for patch/minor bumps; majors still come through individually for manual review.
      nuget-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # FluentAssertions 8.x relicensed to the Xceed commercial license. Stay on the last
      # Apache-2.0 line (7.x); ignore all updates so it is never bumped past the pinned 7.2.0.
      - dependency-name: "FluentAssertions"
      # Microsoft.CodeAnalysis.CSharp: the IPC source generator references it with no explicit version, so this
      # is the floor that decides the minimum Roslyn (and thus SDK/IDE) able to load the generator. Keep it low
      # for broad compatibility; do not bump. (Dependabot PRs #17/#19 were closed for exactly this reason.)
      - dependency-name: "Microsoft.CodeAnalysis.CSharp"

  # Frontend npm dependencies for the Vue sample (build-time dev tooling such as vite/esbuild).
  # These are not shipped in any published package, but keeping them current closes advisory
  # alerts on the sample's lockfile. Majors (e.g. a vite bump) come through individually for review.
  - package-ecosystem: npm
    directory: "/samples/VueApp/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
    labels:
      - dependencies
      - npm
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
