name: Benchmarks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# TST-17: this workflow is PR-only, so always cancel a superseded run for the same PR ref.
concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          # TST-17: pin the SDK to global.json and cache NuGet (key from Directory.Packages.props).
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Run benchmarks
        run: >
          dotnet run
          --project benchmarks/Ryn.Benchmarks/Ryn.Benchmarks.csproj
          -c Release
          --
          --filter "*"
          --exporters json
          --memory

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: BenchmarkDotNet.Artifacts/
