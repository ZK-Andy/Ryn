name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    if: >-
      github.event_name == 'pull_request' ||
      contains(github.event.head_commit.message, '[deploy]')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Debug, Release]

        include:
          - os: macos-latest
            rid: osx-arm64
            archive-ext: .tar.gz
          - os: ubuntu-latest
            rid: linux-x64
            archive-ext: .tar.gz
          - os: windows-latest
            rid: win-x64
            archive-ext: .zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0   # MinVer needs full history + tags to compute the version

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download native libraries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE="saucer-bindings-${{ matrix.rid }}${{ matrix.archive-ext }}"
          DEST="src/Ryn.Interop/runtimes/${{ matrix.rid }}/native"
          mkdir -p "$DEST"

          # Resolve the native-libs release by tag. Don't rely on "latest" — the version
          # releases (v*) are prereleases too, so GitHub reports no latest and a bare
          # `gh release download` silently finds nothing. Match the native-v* tag explicitly
          # (same approach as release.yml).
          TAG=$(gh release list --repo ${{ github.repository }} --limit 50 --json tagName \
                  --jq 'map(select(.tagName | startswith("native-v"))) | sort_by(.tagName) | last.tagName')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::No native-v* release found. Run native-libs.yml first to publish the saucer-bindings artifacts."
            exit 1
          fi

          if gh release download "$TAG" --repo ${{ github.repository }} --pattern "$ARCHIVE" --dir /tmp --clobber; then
            if [[ "${{ matrix.archive-ext }}" == ".zip" ]]; then
              unzip -o "/tmp/$ARCHIVE" -d "$DEST"
            else
              tar -xzf "/tmp/$ARCHIVE" -C "$DEST"
            fi
            echo "Native libraries downloaded successfully from $TAG"
          else
            echo "::error::No prebuilt native libraries for ${{ matrix.rid }} in release $TAG. Integration tests cannot run; failing the job rather than silently skipping. Publish the saucer-bindings artifact or run native-libs.yml first."
            exit 1
          fi
        shell: bash

      - name: Verify native libraries present
        shell: bash
        run: |
          DEST="src/Ryn.Interop/runtimes/${{ matrix.rid }}/native"
          if [ -z "$(ls -A "$DEST" 2>/dev/null)" ]; then
            echo "::error::Native library directory $DEST is empty."
            exit 1
          fi

      - name: Build
        run: dotnet build -c ${{ matrix.configuration }}

      - name: Test
        run: dotnet test --no-build -c ${{ matrix.configuration }} --filter "Category!=Integration&Category!=Package" --logger "trx;LogFileName=results.trx"

      - name: Copy native libs to test output
        shell: bash
        run: |
          SRC="src/Ryn.Interop/runtimes/${{ matrix.rid }}/native"
          DEST="tests/Ryn.Integration.Tests/bin/${{ matrix.configuration }}/net10.0/runtimes/${{ matrix.rid }}/native"
          mkdir -p "$DEST"
          cp "$SRC"/* "$DEST/"

      # Always runs — native libs are guaranteed present by the verify step above, so a missing-lib
      # situation fails the job loudly instead of silently skipping integration coverage.
      - name: Integration test
        run: dotnet test --no-build -c ${{ matrix.configuration }} --filter "Category=Integration" --logger "trx;LogFileName=integration-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.configuration }}
          path: "**/results.trx"
