name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    if: >-
      github.event_name == 'pull_request' ||
      contains(github.event.head_commit.message, '[deploy]')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Debug, Release]

        include:
          - os: macos-latest
            rid: osx-arm64
            archive-ext: .tar.gz
          - os: ubuntu-latest
            rid: linux-x64
            archive-ext: .tar.gz
          - os: windows-latest
            rid: win-x64
            archive-ext: .zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download native libraries
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE="saucer-bindings-${{ matrix.rid }}${{ matrix.archive-ext }}"
          DEST="src/Ryn.Interop/runtimes/${{ matrix.rid }}/native"
          mkdir -p "$DEST"
          if gh release download --repo ${{ github.repository }} --pattern "$ARCHIVE" --dir /tmp --clobber 2>/dev/null; then
            if [[ "${{ matrix.archive-ext }}" == ".zip" ]]; then
              unzip -o "/tmp/$ARCHIVE" -d "$DEST"
            else
              tar -xzf "/tmp/$ARCHIVE" -C "$DEST"
            fi
            echo "Native libraries downloaded successfully"
          else
            echo "No prebuilt native libraries available — integration tests will be skipped"
          fi
        shell: bash

      - name: Build
        run: dotnet build -c ${{ matrix.configuration }}

      - name: Test
        run: dotnet test --no-build -c ${{ matrix.configuration }} --filter "Category!=Integration&Category!=Package" --logger "trx;LogFileName=results.trx"

      - name: Copy native libs to test output
        if: hashFiles(format('src/Ryn.Interop/runtimes/{0}/native/*', matrix.rid)) != ''
        shell: bash
        run: |
          SRC="src/Ryn.Interop/runtimes/${{ matrix.rid }}/native"
          DEST="tests/Ryn.Integration.Tests/bin/${{ matrix.configuration }}/net10.0/runtimes/${{ matrix.rid }}/native"
          mkdir -p "$DEST"
          cp "$SRC"/* "$DEST/"

      - name: Integration test
        if: hashFiles(format('src/Ryn.Interop/runtimes/{0}/native/*', matrix.rid)) != ''
        run: dotnet test --no-build -c ${{ matrix.configuration }} --filter "Category=Integration" --logger "trx;LogFileName=integration-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.configuration }}
          path: "**/results.trx"
