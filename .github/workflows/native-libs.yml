name: Native Libraries

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "vendor/saucer-bindings"
      - ".github/workflows/native-libs.yml"

permissions:
  contents: read

env:
  SAUCER_MODULES: "desktop;loop"
  SAUCER_INLINE_MODULES: "loop"

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[deploy]')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            backend: WebKit
            rid: osx-arm64
            cmake-args: -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
            lib-prefix: lib
            lib-ext: .dylib
            archive-ext: .tar.gz
            rpath: "@loader_path"

          - os: ubuntu-latest
            backend: WebKitGtk
            rid: linux-x64
            cmake-args: ""
            lib-prefix: lib
            lib-ext: .so
            archive-ext: .tar.gz
            container: archlinux:base-devel
            rpath: "$ORIGIN"

          - os: windows-latest
            backend: WebView2
            rid: win-x64
            cmake-args: -A x64
            lib-prefix: ""
            lib-ext: .dll
            archive-ext: .zip
            rpath: ""

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}
    name: ${{ matrix.rid }}

    steps:
      - name: Install git (Linux container)
        if: matrix.rid == 'linux-x64'
        run: pacman --noconfirm -Syu git

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: matrix.rid == 'linux-x64'
        run: pacman --noconfirm -Syu cmake gcc ninja gtk4 libadwaita webkitgtk-6.0

      # Note: no CMAKE_*_OUTPUT_DIRECTORY override — in the Linux container job that path
      # (${{ github.workspace }}) resolves to the host mount, not the in-container workdir, so
      # the Collect step couldn't find the libs. Default build-tree locations under build/native
      # are searched by Collect on every platform. CMAKE_INSTALL_RPATH makes each library find
      # its co-located siblings at runtime ($ORIGIN / @loader_path) instead of the build path.
      - name: Configure
        run: >
          cmake -S vendor/saucer-bindings -B build/native
          -DCMAKE_BUILD_TYPE=Release
          -Dsaucer_backend=${{ matrix.backend }}
          -Dsaucer_bindings_modules="${{ env.SAUCER_MODULES }}"
          -Dsaucer_bindings_inline_modules="${{ env.SAUCER_INLINE_MODULES }}"
          -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON
          -DCMAKE_INSTALL_RPATH='${{ matrix.rpath }}'
          ${{ matrix.cmake-args }}

      - name: Build
        run: cmake --build build/native --config Release

      - name: Collect libraries
        shell: bash
        run: |
          mkdir -p staging
          SEARCH_DIRS=""
          [ -d native-out ] && SEARCH_DIRS="native-out"
          [ -d build/native ] && SEARCH_DIRS="$SEARCH_DIRS build/native"
          find $SEARCH_DIRS -maxdepth 5 \
            \( -name "${{ matrix.lib-prefix }}saucer${{ matrix.lib-ext }}" \
            -o -name "${{ matrix.lib-prefix }}saucer-bindings${{ matrix.lib-ext }}" \
            -o -name "${{ matrix.lib-prefix }}saucer-bindings-desktop${{ matrix.lib-ext }}" \) \
            -exec cp {} staging/ \;
          echo "Collected:"
          ls -la staging/

      - name: Collect Windows transitive dependencies
        if: matrix.rid == 'win-x64'
        shell: bash
        run: |
          find build/native/_deps/saucer-build -name "saucer.dll" -exec cp {} staging/ \; 2>/dev/null || true
          find build/native/_deps/saucer-build -name "WebView2Loader.dll" -path "*/win-x64/*" -exec cp {} staging/ \; 2>/dev/null || true
          ls -la staging/

      - name: Build ryn-pty shim (Unix only)
        if: matrix.rid != 'win-x64'
        shell: bash
        run: |
          PTY_SRC="src/Ryn.Plugins.Shell/native/ryn_pty.c"
          PTY_LIB="${{ matrix.lib-prefix }}ryn-pty${{ matrix.lib-ext }}"
          cc -shared -fPIC -O2 -lutil -o "staging/$PTY_LIB" "$PTY_SRC"

      - name: Package (tar.gz)
        if: matrix.archive-ext == '.tar.gz'
        run: tar -czf saucer-bindings-${{ matrix.rid }}${{ matrix.archive-ext }} -C staging .

      - name: Package (zip)
        if: matrix.archive-ext == '.zip'
        shell: bash
        run: cd staging && 7z a -tzip ../saucer-bindings-${{ matrix.rid }}${{ matrix.archive-ext }} .

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: saucer-bindings-${{ matrix.rid }}
          path: saucer-bindings-${{ matrix.rid }}${{ matrix.archive-ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write   # create/update the native-v* GitHub release with the built libs

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Get saucer version
        id: version
        run: |
          cd vendor/saucer-bindings
          COMMIT=$(git rev-parse --short HEAD)
          # TST-05: read the PROJECT version, not the first "VERSION" token in the file. The naive
          # `grep -oP 'VERSION \K[0-9.]+' | head -1` matched `cmake_minimum_required(VERSION 3.21)`,
          # so every release was tagged native-v3.21-<sha> and the constant prefix made the random
          # short SHA the sole lexicographic sort key. Anchor on the project(...) declaration so the
          # tag carries the real saucer version (e.g. 8.0.4).
          VERSION=$(grep -oP 'project\s*\([^)]*VERSION\s+\K[0-9]+(\.[0-9]+)*' CMakeLists.txt | head -1)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse project VERSION from vendor/saucer-bindings/CMakeLists.txt"
            exit 1
          fi
          echo "tag=native-v${VERSION}-${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "name=Native Libraries v${VERSION} (${COMMIT})" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NAME="${{ steps.version.outputs.name }}"

          # Delete existing release with same tag if it exists
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Create new release
          gh release create "$TAG" \
            --title "$NAME" \
            --notes "Prebuilt saucer-bindings native libraries for all platforms." \
            --latest \
            artifacts/saucer-bindings-*.tar.gz \
            artifacts/saucer-bindings-*.zip
