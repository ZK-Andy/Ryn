name: Release

on:
  push:
    tags: ["v*"]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download native libraries for all platforms
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RIDS="osx-arm64 linux-x64 win-x64"
          TAG=$(gh release list --repo ${{ github.repository }} --limit 10 | grep -o 'native-v[^ ]*' | head -1 || true)

          for RID in $RIDS; do
            EXT=".tar.gz"
            if [ "$RID" = "win-x64" ]; then EXT=".zip"; fi
            ARCHIVE="saucer-bindings-${RID}${EXT}"
            DEST="src/Ryn.Interop/runtimes/${RID}/native"
            mkdir -p "$DEST"

            DOWNLOADED=false
            if gh release download --repo ${{ github.repository }} --pattern "$ARCHIVE" --dir /tmp --clobber 2>/dev/null; then
              DOWNLOADED=true
            elif [ -n "$TAG" ]; then
              if gh release download "$TAG" --repo ${{ github.repository }} --pattern "$ARCHIVE" --dir /tmp --clobber 2>/dev/null; then
                DOWNLOADED=true
              fi
            fi

            if [ "$DOWNLOADED" = "true" ]; then
              if [ "$EXT" = ".zip" ]; then
                unzip -o "/tmp/$ARCHIVE" -d "$DEST"
              else
                tar -xzf "/tmp/$ARCHIVE" -C "$DEST"
              fi
              echo "Downloaded native libs for $RID"
            else
              echo "FATAL: No native libs for $RID"
              exit 1
            fi
          done

          # Verify all expected files exist
          for RID in $RIDS; do
            COUNT=$(find "src/Ryn.Interop/runtimes/${RID}/native" -type f | wc -l)
            if [ "$COUNT" -eq 0 ]; then
              echo "FATAL: No native files found for $RID"
              exit 1
            fi
            echo "$RID: $COUNT native file(s)"
          done

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release -p:VersionPrefix=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack -c Release -p:VersionPrefix=${{ steps.version.outputs.VERSION }} -o ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push "./nupkg/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "./nupkg/*.nupkg"
