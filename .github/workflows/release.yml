# On a version tag (v*): publishes all packages to NuGet.org, and creates a GitHub release
# carrying the framework DLLs (managed assemblies + native libs) and the standalone ryn CLI
# binaries per platform — NOT the .nupkgs (those live on nuget.org).
# Versions come from the tag via MinVer (e.g. tag v0.1.0-alpha.2 -> 0.1.0-alpha.2).
#
# One-time setup (no API-key secret needed — uses NuGet trusted publishing / OIDC):
#   1. On nuget.org: Account -> Trusted Publishing -> add a GitHub Actions policy with
#      Repository owner: Yupmoh, Repository: Ryn, Workflow file: release.yml.
#      (Set a package glob like Ryn.* so new package IDs are covered on first publish.)
#   2. In this repo: Settings -> Secrets and variables -> Actions -> Variables ->
#      add NUGET_USER = your nuget.org username.
#   3. Cut a release:  git tag v0.1.0-alpha.2 && git push origin v0.1.0-alpha.2
name: Release

on:
  push:
    tags: ["v*"]

# Least-privilege default: build-cli only needs to read the repo. The release and
# unlist-plumbing jobs widen this per-job (contents: write / id-token: write).
permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  # Build the standalone `ryn` CLI as a self-contained NativeAOT binary per platform.
  # NativeAOT can't cross-compile, so each RID builds on its own OS.
  build-cli:
    name: build-cli (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rid: osx-arm64
            binary: Ryn.Cli
            asset: ryn-osx-arm64
          - os: ubuntu-latest
            rid: linux-x64
            binary: Ryn.Cli
            asset: ryn-linux-x64
          - os: windows-latest
            rid: win-x64
            binary: Ryn.Cli.exe
            asset: ryn-win-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          fetch-depth: 0   # MinVer needs full history + tags for the version

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          # TST-17: pin the SDK to global.json and cache NuGet (key derived from Directory.Packages.props
          # under central package management — no lockfiles in this repo).
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Install AOT prerequisites (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish the ryn CLI (NativeAOT, self-contained)
        run: dotnet publish src/Ryn.Cli/Ryn.Cli.csproj -c Release -r ${{ matrix.rid }} --self-contained

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p cli-out
          cp "src/Ryn.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.binary }}" "cli-out/${{ matrix.asset }}"

      - name: Upload CLI binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: cli-out/${{ matrix.asset }}

  release:
    needs: build-cli
    runs-on: ubuntu-latest

    permissions:
      contents: write    # read native-lib release assets + create the GitHub release
      id-token: write    # OIDC token for NuGet trusted publishing

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          fetch-depth: 0   # MinVer derives the package version from the tag + history

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          # TST-17: pin the SDK to global.json and cache NuGet (key from Directory.Packages.props).
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Download native libraries for all platforms
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RIDS="osx-arm64 linux-x64 win-x64"

          # Resolve the native-libs release by tag (don't rely on "latest" — version releases are
          # prereleases too, so GitHub may report no latest). --json/--jq avoids tab-capture bugs.
          #
          # TST-05: select the MOST RECENT native-v* release by publish date, not the lexicographic
          # max of the tag name. Tags carry a random {shortsha} suffix and old releases persist, so
          # `sort_by(.tagName)|last` could SHIP a stale native lib in the published packages. Sorting
          # by publishedAt (falling back to createdAt) always picks the newest build.
          TAG=$(gh release list --repo ${{ github.repository }} --limit 50 --json tagName,createdAt,publishedAt \
                  --jq 'map(select(.tagName | startswith("native-v"))) | sort_by(.publishedAt // .createdAt) | last.tagName')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "FATAL: no native-v* release found"; exit 1
          fi
          echo "Using native-libs release: $TAG"

          for RID in $RIDS; do
            EXT=".tar.gz"
            if [ "$RID" = "win-x64" ]; then EXT=".zip"; fi
            ARCHIVE="saucer-bindings-${RID}${EXT}"
            DEST="src/Ryn.Interop/runtimes/${RID}/native"
            mkdir -p "$DEST"

            if ! gh release download "$TAG" --repo ${{ github.repository }} --pattern "$ARCHIVE" --dir /tmp --clobber; then
              echo "FATAL: $ARCHIVE not found in release $TAG"; exit 1
            fi

            # Supply-chain guard (SUP-01): verify the downloaded archive against its pinned SHA-256
            # in build/native-checksums.txt BEFORE extracting. Fails CLOSED — a mismatch OR a missing
            # pin aborts the release so a tampered, corrupt, or unpinned artifact is never shipped.
            EXPECTED=$(grep -E "[[:space:]]${ARCHIVE}\$" build/native-checksums.txt | grep -v '^#' | awk '{print $1}' | head -n1)
            if [ -z "$EXPECTED" ]; then
              echo "FATAL: no pinned checksum for $ARCHIVE in build/native-checksums.txt (fail-closed supply-chain check)"; exit 1
            fi
            ACTUAL=$(if command -v sha256sum >/dev/null 2>&1; then sha256sum "/tmp/$ARCHIVE"; else shasum -a 256 "/tmp/$ARCHIVE"; fi | awk '{print $1}')
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "FATAL: CHECKSUM MISMATCH for $ARCHIVE — expected $EXPECTED but got $ACTUAL"; exit 1
            fi
            echo "Checksum verified for $ARCHIVE ($EXPECTED)"

            if [ "$EXT" = ".zip" ]; then
              unzip -o "/tmp/$ARCHIVE" -d "$DEST"
            else
              tar -xzf "/tmp/$ARCHIVE" -C "$DEST"
            fi
            echo "Downloaded native libs for $RID"
          done

          # Verify all expected files exist
          for RID in $RIDS; do
            COUNT=$(find "src/Ryn.Interop/runtimes/${RID}/native" -type f | wc -l)
            if [ "$COUNT" -eq 0 ]; then
              echo "FATAL: No native files found for $RID"
              exit 1
            fi
            echo "$RID: $COUNT native file(s)"
          done

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release   # MinVer sets the version from the pushed tag

      # Unit tests only. Integration tests need per-OS native libs and a copy step (see
      # build.yml's matrix) — that's the integration gate; the single-runner release job
      # must not re-run them. The package smoke test (Category=Package) runs in build.yml's
      # macOS leg (TST-02); this release job's own Verify-packaged-assets step below is the
      # release-time backstop, so Package is excluded here too.
      - name: Test
        run: dotnet test -c Release --no-build --filter "Category!=Integration&Category!=Package"

      # No --no-build: the Ryn bundle resolves its project references during pack, which trips
      # NETSDK1085 ("NoBuild set but Build invoked") under --no-build. An incremental build here
      # is a near no-op since the Build step above already compiled everything.
      - name: Pack
        run: dotnet pack -c Release -o ./nupkg

      - name: Verify packaged assets
        shell: bash
        run: |
          # Required native files per RID. The saucer engine is listed explicitly so a
          # missing-engine regression (which shipped before) fails the release loudly.
          rid_files() {
            case "$1" in
              osx-arm64) echo "libsaucer.dylib libsaucer-bindings.dylib libsaucer-bindings-desktop.dylib libryn-pty.dylib" ;;
              linux-x64) echo "libsaucer.so libsaucer-bindings.so libsaucer-bindings-desktop.so libryn-pty.so" ;;
              win-x64)   echo "saucer.dll saucer-bindings.dll saucer-bindings-desktop.dll WebView2Loader.dll" ;;
            esac
          }

          verify_native() {
            local pkg; pkg=$(ls $1 | head -1)
            echo "== native assets in $(basename "$pkg") =="
            local contents; contents=$(unzip -l "$pkg")
            local rid f
            for rid in osx-arm64 linux-x64 win-x64; do
              for f in $(rid_files "$rid"); do
                if echo "$contents" | grep -qF "runtimes/${rid}/native/${f}"; then
                  echo "  OK: ${rid}/${f}"
                else
                  echo "  FATAL: ${rid}/${f} missing from $(basename "$pkg")"; exit 1
                fi
              done
            done
          }

          # Native libraries ship in Ryn.Interop.
          verify_native "./nupkg/Ryn.Interop.*.nupkg"

          # Ryn is a metapackage: it must DECLARE dependencies on Core/Ipc/Interop (not contain them).
          echo "== Ryn metapackage dependencies =="
          RYN_NUSPEC=$(unzip -p "$(ls ./nupkg/Ryn.[0-9]*.nupkg | head -1)" Ryn.nuspec)
          for dep in Ryn.Core Ryn.Ipc Ryn.Interop; do
            if echo "$RYN_NUSPEC" | grep -q "dependency id=\"$dep\""; then
              echo "  OK: Ryn -> $dep"
            else
              echo "  FATAL: Ryn metapackage missing dependency $dep"; exit 1
            fi
          done

          # The IPC source generator must ship from exactly ONE package (Ryn.Ipc). If it also
          # shipped from Ryn, an app using Ryn + a plugin would load two copies and emit duplicate
          # code (the alpha.1 bug).
          echo "== generator ships once (Ryn.Ipc only) =="
          if ! unzip -Z1 "$(ls ./nupkg/Ryn.Ipc.[0-9]*.nupkg | head -1)" | grep -q 'analyzers/dotnet/cs/Ryn.Ipc.Generator.dll'; then
            echo "  FATAL: Ryn.Ipc must ship the IPC source generator"; exit 1
          fi
          if unzip -Z1 "$(ls ./nupkg/Ryn.[0-9]*.nupkg | head -1)" | grep -q 'Ryn.Ipc.Generator'; then
            echo "  FATAL: the Ryn metapackage must NOT ship the generator (would duplicate)"; exit 1
          fi
          echo "  OK: generator only in Ryn.Ipc"

      # Trusted publishing: exchange the GitHub OIDC token for a short-lived NuGet API key.
      # No long-lived secret — configure a trusted publisher policy on NuGet.org instead
      # (see the comment at the top of this file).
      - name: Authenticate to NuGet (trusted publishing)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push "./nupkg/*.nupkg" --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      # The GitHub release carries the DLLs + the CLI (NOT the .nupkgs — those go to nuget.org).
      - name: Assemble framework DLLs
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          mkdir -p stage/lib
          # Ryn's own managed assemblies (Core, Ipc, Interop, the generator, plugins) — not the CLI.
          find src -path '*/bin/Release/*' -name 'Ryn.*.dll' ! -name 'Ryn.Cli.dll' -exec cp -n {} stage/lib/ \;
          # Native webview libraries per RID (downloaded earlier into Ryn.Interop/runtimes).
          cp -R src/Ryn.Interop/runtimes stage/runtimes
          echo "Bundled DLLs:"; ls stage/lib
          (cd stage && zip -r "../Ryn-${VER}-dlls.zip" .)

      - name: Download CLI binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./cli-bin
          pattern: ryn-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          # A tag with a prerelease suffix (e.g. v0.1.0-alpha.1) marks the release as a prerelease.
          prerelease: ${{ contains(github.ref_name, '-') }}
          # DLLs (managed assemblies + native libs) and the standalone CLI binaries. No .nupkgs.
          files: |
            ./Ryn-*-dlls.zip
            ./cli-bin/ryn-*

  # Unlist the internal "plumbing" packages so only Ryn + plugins + CLI + Templates are visible on
  # nuget.org. The Ryn metapackage still restores them by exact version (unlist is not delete).
  # Runs as its own job AFTER publishing so it never delays or risks the release, and is best-effort
  # (always green). It tries the trusted-publishing OIDC token first — if that token has the Unlist
  # scope, no stored secret is needed; otherwise it falls back to a nuget.org API key with the
  # "Unlist" scope supplied as the NUGET_API_KEY secret. The next release's logs show which worked.
  unlist-plumbing:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # mint a trusted-publishing token to try unlisting without a stored key
    steps:
      # TST-17: this job intentionally does NOT check out the repo (it only runs `dotnet nuget delete`),
      # so there is no global.json / Directory.Packages.props on disk to pin or cache against. Keep the
      # hardcoded channel here; global-json-file and NuGet caching apply only to the checkout-backed jobs.
      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: "10.0.x"

      # Wait BEFORE minting the token (it's short-lived): a freshly pushed package can't be unlisted
      # until NuGet validates it. They validate roughly in parallel, so only the first wait is long.
      - name: Wait for packages to validate
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for lc in ryn.core ryn.ipc ryn.interop ryn.ipc.generator; do
            echo "Waiting for $lc $VERSION to finish validating on NuGet..."
            for i in $(seq 1 20); do
              if curl -sf "https://api.nuget.org/v3-flatcontainer/$lc/index.json" | grep -q "\"$VERSION\""; then
                echo "  $lc $VERSION is live"; break
              fi
              sleep 30
            done
          done

      - name: Authenticate to NuGet (trusted publishing)
        id: login
        continue-on-error: true
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Unlist plumbing packages
        shell: bash
        env:
          TP_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
          FALLBACK_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set +e
          SRC=https://api.nuget.org/v3/index.json
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$TP_KEY" ] && [ -z "$FALLBACK_KEY" ]; then
            echo "No key available (trusted-publishing login failed and NUGET_API_KEY not set) — skipping."
            exit 0
          fi
          for pkg in Ryn.Core Ryn.Ipc Ryn.Interop Ryn.Ipc.Generator; do
            ok=false
            # 1) trusted-publishing token (no stored secret needed if it carries the Unlist scope)
            if [ -n "$TP_KEY" ] && \
               dotnet nuget delete "$pkg" "$VERSION" --source "$SRC" --api-key "$TP_KEY" --non-interactive; then
              echo "Unlisted $pkg $VERSION (trusted-publishing token)"; ok=true
            elif [ -n "$TP_KEY" ]; then
              echo "  trusted-publishing token could not unlist $pkg (likely no Unlist scope)"
            fi
            # 2) fall back to the dedicated unlist key
            if [ "$ok" = false ] && [ -n "$FALLBACK_KEY" ] && \
               dotnet nuget delete "$pkg" "$VERSION" --source "$SRC" --api-key "$FALLBACK_KEY" --non-interactive; then
              echo "Unlisted $pkg $VERSION (NUGET_API_KEY)"; ok=true
            fi
            [ "$ok" = true ] || echo "Could not unlist $pkg $VERSION — unlist it manually if needed."
          done
          exit 0
