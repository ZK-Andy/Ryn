# Publishes all packages to NuGet.org when a version tag (v*) is pushed.
# Versions come from the tag via MinVer (e.g. tag v0.1.0-alpha.2 -> 0.1.0-alpha.2).
#
# One-time setup (no API-key secret needed — uses NuGet trusted publishing / OIDC):
#   1. On nuget.org: Account -> Trusted Publishing -> add a GitHub Actions policy with
#      Repository owner: Yupmoh, Repository: Ryn, Workflow file: release.yml.
#      (Set a package glob like Ryn.* so new package IDs are covered on first publish.)
#   2. In this repo: Settings -> Secrets and variables -> Actions -> Variables ->
#      add NUGET_USER = your nuget.org username.
#   3. Cut a release:  git tag v0.1.0-alpha.2 && git push origin v0.1.0-alpha.2
name: Release

on:
  push:
    tags: ["v*"]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write    # read native-lib release assets + create the GitHub release
      id-token: write    # OIDC token for NuGet trusted publishing

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0   # MinVer derives the package version from the tag + history

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download native libraries for all platforms
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RIDS="osx-arm64 linux-x64 win-x64"
          TAG=$(gh release list --repo ${{ github.repository }} --limit 10 | grep -o 'native-v[^ ]*' | head -1 || true)

          for RID in $RIDS; do
            EXT=".tar.gz"
            if [ "$RID" = "win-x64" ]; then EXT=".zip"; fi
            ARCHIVE="saucer-bindings-${RID}${EXT}"
            DEST="src/Ryn.Interop/runtimes/${RID}/native"
            mkdir -p "$DEST"

            DOWNLOADED=false
            if gh release download --repo ${{ github.repository }} --pattern "$ARCHIVE" --dir /tmp --clobber 2>/dev/null; then
              DOWNLOADED=true
            elif [ -n "$TAG" ]; then
              if gh release download "$TAG" --repo ${{ github.repository }} --pattern "$ARCHIVE" --dir /tmp --clobber 2>/dev/null; then
                DOWNLOADED=true
              fi
            fi

            if [ "$DOWNLOADED" = "true" ]; then
              if [ "$EXT" = ".zip" ]; then
                unzip -o "/tmp/$ARCHIVE" -d "$DEST"
              else
                tar -xzf "/tmp/$ARCHIVE" -C "$DEST"
              fi
              echo "Downloaded native libs for $RID"
            else
              echo "FATAL: No native libs for $RID"
              exit 1
            fi
          done

          # Verify all expected files exist
          for RID in $RIDS; do
            COUNT=$(find "src/Ryn.Interop/runtimes/${RID}/native" -type f | wc -l)
            if [ "$COUNT" -eq 0 ]; then
              echo "FATAL: No native files found for $RID"
              exit 1
            fi
            echo "$RID: $COUNT native file(s)"
          done

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release   # MinVer sets the version from the pushed tag

      # Unit tests only. Integration tests need per-OS native libs and a copy step (see
      # build.yml's matrix) — that's the integration gate; the single-runner release job
      # must not re-run them. Package tests are likewise covered in build.yml.
      - name: Test
        run: dotnet test -c Release --no-build --filter "Category!=Integration&Category!=Package"

      - name: Pack
        run: dotnet pack -c Release --no-build -o ./nupkg

      - name: Verify packaged assets
        shell: bash
        run: |
          # Required native files per RID. The saucer engine is listed explicitly so a
          # missing-engine regression (which shipped before) fails the release loudly.
          rid_files() {
            case "$1" in
              osx-arm64) echo "libsaucer.dylib libsaucer-bindings.dylib libsaucer-bindings-desktop.dylib libryn-pty.dylib" ;;
              linux-x64) echo "libsaucer.so libsaucer-bindings.so libsaucer-bindings-desktop.so libryn-pty.so" ;;
              win-x64)   echo "saucer.dll saucer-bindings.dll saucer-bindings-desktop.dll WebView2Loader.dll" ;;
            esac
          }

          verify_native() {
            local pkg; pkg=$(ls $1 | head -1)
            echo "== native assets in $(basename "$pkg") =="
            local contents; contents=$(unzip -l "$pkg")
            local rid f
            for rid in osx-arm64 linux-x64 win-x64; do
              for f in $(rid_files "$rid"); do
                if echo "$contents" | grep -qF "runtimes/${rid}/native/${f}"; then
                  echo "  OK: ${rid}/${f}"
                else
                  echo "  FATAL: ${rid}/${f} missing from $(basename "$pkg")"; exit 1
                fi
              done
            done
          }

          # Both Ryn.Interop and the Ryn bundle ship the native runtimes.
          verify_native "./nupkg/Ryn.Interop.*.nupkg"
          verify_native "./nupkg/Ryn.[0-9]*.nupkg"

          # The Ryn bundle must also carry the framework assemblies + the IPC source generator.
          echo "== Ryn bundle contents =="
          RYN_CONTENTS=$(unzip -l $(ls ./nupkg/Ryn.[0-9]*.nupkg | head -1))
          for f in lib/net10.0/Ryn.Core.dll lib/net10.0/Ryn.Ipc.dll lib/net10.0/Ryn.Interop.dll \
                   analyzers/dotnet/cs/Ryn.Ipc.Generator.dll; do
            if echo "$RYN_CONTENTS" | grep -qF "$f"; then
              echo "  OK: $f"
            else
              echo "  FATAL: Ryn bundle missing $f"; exit 1
            fi
          done

      # Trusted publishing: exchange the GitHub OIDC token for a short-lived NuGet API key.
      # No long-lived secret — configure a trusted publisher policy on NuGet.org instead
      # (see the comment at the top of this file).
      - name: Authenticate to NuGet (trusted publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push "./nupkg/*.nupkg" --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: "./nupkg/*.nupkg"
