name: Regenerate Bindings

on:
  push:
    branches: [main]   # not on version tags — regenerating bindings on a release tag is meaningless
    paths:
      # TST-04: a submodule-pointer bump shows up in the push diff as the BARE path
      # "vendor/saucer-bindings" (no trailing slash), which "/**" never matches — the documented GHA
      # submodule gotcha. List the bare path too (matching native-libs.yml) so a saucer bump actually
      # triggers a bindings regeneration instead of silently drifting from the vendored headers.
      - "vendor/saucer-bindings"
      - "vendor/saucer-bindings/**"
      - "build/clangsharp/**"
  workflow_dispatch:

permissions:
  contents: read

# TST-17: cancel a superseded regeneration if another saucer bump lands on main before this finishes.
concurrency:
  group: bindings-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  regenerate:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          # TST-17: pin the SDK to global.json and cache NuGet (key from Directory.Packages.props).
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Install LLVM 21
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-21 main"
          sudo apt-get update
          # clang-21 provides the clang binary (for -print-resource-dir) and pulls in the builtin
          # headers (libclang-common-21-dev → stddef.h); libclang-21-dev provides libclang itself.
          sudo apt-get install -y libclang-21-dev clang-21

      - name: Install ClangSharp
        run: dotnet tool install --global ClangSharpPInvokeGenerator

      - name: Regenerate bindings
        run: bash build/regenerate-bindings.sh

      - name: Check for changes
        id: diff
        run: |
          git diff --exit-code src/Ryn.Interop/Generated/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create PR if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="auto/update-bindings-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git add src/Ryn.Interop/Generated/
          git commit -m "chore: regenerate saucer bindings

          - Auto-generated via ClangSharp from updated saucer headers"
          git push origin "$BRANCH"
          gh pr create --title "chore: regenerate saucer bindings" --body "Automated binding regeneration triggered by saucer submodule or ClangSharp config update." --base main --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
