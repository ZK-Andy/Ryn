name: NativeAOT Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# TST-17: cancel superseded PR runs per-ref; main pushes keep their own per-SHA group.
concurrency:
  group: aot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  aot:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          # TST-17: pin the SDK to global.json and cache NuGet (key from Directory.Packages.props).
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Install AOT prerequisites (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish Ryn.Cli with NativeAOT
        run: dotnet publish src/Ryn.Cli/Ryn.Cli.csproj -c Release -r ${{ matrix.rid }} --self-contained

      - name: Verify binary exists
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            ls -la src/Ryn.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish/Ryn.Cli.exe
          else
            ls -la src/Ryn.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish/Ryn.Cli
          fi

      - name: Smoke test
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            src/Ryn.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish/Ryn.Cli.exe --version
          else
            src/Ryn.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish/Ryn.Cli --version
          fi

      - name: Report binary size
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            du -sh src/Ryn.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish/Ryn.Cli.exe
          else
            du -sh src/Ryn.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish/Ryn.Cli
          fi
