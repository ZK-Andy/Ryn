<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Ryn File Manager</title>
<style>
  :root {
    --bg: #0b0c12; --surface: #13141d; --surface2: #1b1c27; --surface3: #23232f;
    --border: #262838; --border-soft: #1b1c26; --text: #e9e9f1; --text-dim: #b8bacb;
    --muted: #6e7188; --accent: #e07b81; --accent-bright: #ef8d92; --accent-dim: #b9656b;
    --accent-soft: rgba(224,123,129,0.13); --red: #f87171;
    --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); font-size: 13px;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }

  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2c2e3d; border-radius: 7px; border: 3px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: #3a3c4f; }

  /* Toolbar */
  .toolbar {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    /* Overlay title bar: content is edge-to-edge, so pad past the traffic lights (left)
       and below the title-bar strip (top). Ryn injects both insets at startup. */
    padding:
      calc(var(--ryn-titlebar-inset-top, 0px) + 9px)
      14px
      9px
      calc(var(--ryn-titlebar-inset-left, 0px) + 14px);
  }
  .brand {
    display: flex; align-items: center; gap: 8px; padding: 0 8px 0 2px;
    font-weight: 650; font-size: 13px; color: var(--text); letter-spacing: 0.2px;
    white-space: nowrap;
  }
  .brand .dot {
    width: 9px; height: 9px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }
  .toolbar .btn {
    padding: 6px 12px; border-radius: 7px; border: 1px solid transparent;
    background: var(--surface2); color: var(--text-dim); cursor: pointer;
    font-size: 12.5px; font-weight: 550; transition: all 0.12s ease;
    display: flex; align-items: center; gap: 6px;
  }
  .toolbar .btn:hover { background: var(--surface3); color: var(--text); border-color: #34364a; }
  .toolbar .btn:active { transform: translateY(0.5px); }

  /* Breadcrumb */
  .breadcrumb {
    display: flex; align-items: center; flex: 1; gap: 1px; height: 32px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
    padding: 0 10px; font-size: 12.5px; overflow-x: auto; white-space: nowrap;
  }
  .breadcrumb::-webkit-scrollbar { height: 0; }
  .breadcrumb span { color: var(--muted); padding: 0 1px; }
  .breadcrumb a {
    color: var(--text-dim); text-decoration: none; cursor: pointer;
    padding: 3px 6px; border-radius: 5px; transition: all 0.12s;
  }
  .breadcrumb a:hover { background: var(--surface2); color: var(--accent-bright); }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* File list */
  .file-panel { flex: 1; overflow-y: auto; }
  .file-table { width: 100%; border-collapse: collapse; }
  .file-table thead { position: sticky; top: 0; z-index: 1; }
  .file-table th {
    padding: 9px 16px; text-align: left; font-size: 10.5px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .file-table td {
    padding: 8px 16px; font-size: 13px; border-bottom: 1px solid var(--border-soft);
  }
  .file-table tbody tr { cursor: default; transition: background 0.08s; }
  .file-table tbody tr:hover td { background: var(--surface); }
  .file-table tr.selected td { background: var(--accent-soft); }
  .file-table tr.selected td:first-child { box-shadow: inset 2px 0 0 var(--accent); }
  .file-row-icon { width: 30px; text-align: center; font-size: 15px; opacity: 0.92; }
  .file-row-name { font-weight: 500; color: var(--text); }
  .file-row-name.dir { color: var(--accent-bright); cursor: pointer; font-weight: 550; }
  .file-row-size { color: var(--muted); font-family: var(--mono); font-size: 11.5px; width: 100px; text-align: right; }
  .file-row-date { color: var(--muted); font-size: 11.5px; width: 160px; }

  /* Preview panel */
  .preview-panel {
    width: 360px; border-left: 1px solid var(--border);
    display: flex; flex-direction: column; background: var(--surface); flex-shrink: 0;
  }
  .preview-panel.hidden { display: none; }
  .preview-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .preview-header h3 {
    font-size: 13px; color: var(--text); font-weight: 600;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
  }
  .preview-close {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 15px; padding: 2px 7px; line-height: 1; border-radius: 5px; transition: all 0.12s;
  }
  .preview-close:hover { color: var(--text); background: var(--surface2); }
  .preview-meta {
    padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .preview-meta table { width: 100%; border-collapse: collapse; }
  .preview-meta td { padding: 4px 0; vertical-align: top; }
  .preview-meta td:first-child { color: var(--muted); width: 72px; font-weight: 500; }
  .preview-meta td:last-child { color: var(--text-dim); font-family: var(--mono); font-size: 11.5px; word-break: break-all; }
  .preview-content {
    flex: 1; overflow: auto; padding: 14px 16px;
    font-family: var(--mono); font-size: 12px; line-height: 1.65;
    white-space: pre-wrap; word-break: break-word; color: var(--text-dim);
  }
  .preview-placeholder {
    display: flex; align-items: center; justify-content: center;
    flex: 1; color: var(--muted); font-size: 13px;
  }

  /* Status bar */
  .statusbar {
    padding: 6px 16px; background: var(--surface); border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted); flex-shrink: 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .statusbar #statusRight { font-family: var(--mono); font-size: 10.5px; opacity: 0.85; }

  /* Loading & error states */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 64px 20px; color: var(--muted); gap: 10px; font-size: 13px; text-align: center;
  }
  .empty-state .icon { font-size: 38px; opacity: 0.55; }
  .empty-state strong { color: var(--text-dim); font-weight: 600; }
  .error-msg {
    padding: 14px 16px; margin: 16px; background: rgba(248,113,113,0.07);
    border: 1px solid rgba(248,113,113,0.25); border-radius: 8px; color: var(--red); font-size: 12.5px;
  }

  @keyframes pulse { 0%,100% { opacity:0.45; } 50% { opacity:0.9; } }
  .loading { animation: pulse 1.4s ease-in-out infinite; color: var(--muted); padding: 28px; text-align: center; font-size: 13px; }
</style>
</head>
<body>

<div class="toolbar">
  <div class="brand"><span class="dot"></span>Ryn Files</div>
  <button class="btn" onclick="goUp()" title="Go to parent directory">&#x2191; Up</button>
  <button class="btn" onclick="goHome()" title="Go to home directory">&#x2302; Home</button>
  <div class="breadcrumb" id="breadcrumb"></div>
  <button class="btn" onclick="refresh()" title="Refresh">&#x21BB;</button>
</div>

<div class="main">
  <div class="file-panel" id="filePanel">
    <table class="file-table">
      <thead>
        <tr>
          <th style="width:32px"></th>
          <th>Name</th>
          <th style="width:100px;text-align:right">Size</th>
          <th style="width:160px">Modified</th>
        </tr>
      </thead>
      <tbody id="fileList">
        <tr><td colspan="4"><div class="loading">Loading...</div></td></tr>
      </tbody>
    </table>
  </div>
  <div class="preview-panel hidden" id="previewPanel">
    <div class="preview-header">
      <h3 id="previewTitle">Preview</h3>
      <button class="preview-close" onclick="closePreview()">&#x2715;</button>
    </div>
    <div class="preview-meta" id="previewMeta"></div>
    <div class="preview-content" id="previewContent"></div>
  </div>
</div>

<div class="statusbar">
  <span id="statusLeft">Ready</span>
  <span id="statusRight"></span>
</div>

<script>
  var currentPath = '';
  var entries = [];
  var selectedIndex = -1;
  var isRynAvailable = false;

  async function invoke(cmd, args) {
    if (!window.__ryn || !window.__ryn.invoke) {
      throw new Error('Not running inside Ryn. Use the Ryn runtime to browse files.');
    }
    return await window.__ryn.invoke(cmd, args || {});
  }

  function formatSize(bytes) {
    if (bytes === 0) return '--';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
    return (bytes / 1073741824).toFixed(1) + ' GB';
  }

  function formatDate(isoStr) {
    try {
      var d = new Date(isoStr);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } catch (e) {
      return isoStr;
    }
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function updateBreadcrumb(path) {
    var parts = path.split('/').filter(function(p) { return p.length > 0; });
    var html = '<a onclick="navigateTo(\'/\')">&#x2302;</a>';
    var accumulated = '';
    for (var i = 0; i < parts.length; i++) {
      accumulated += '/' + parts[i];
      html += '<span>/</span>';
      var escapedPath = accumulated.replace(/'/g, "\\'");
      html += '<a onclick="navigateTo(\'' + escapedPath + '\')">' + escapeHtml(parts[i]) + '</a>';
    }
    document.getElementById('breadcrumb').innerHTML = html;
  }

  async function navigateTo(path) {
    currentPath = path;
    selectedIndex = -1;
    closePreview();
    updateBreadcrumb(path);
    document.getElementById('statusLeft').textContent = 'Loading...';

    try {
      var result = await invoke('fs.readDir', { path: path });
      entries = JSON.parse(result);

      entries.sort(function(a, b) {
        if (a.isDirectory !== b.isDirectory) return a.isDirectory ? -1 : 1;
        return a.name.localeCompare(b.name);
      });

      renderFileList();
      var dirs = entries.filter(function(e) { return e.isDirectory; }).length;
      var files = entries.length - dirs;
      document.getElementById('statusLeft').textContent = dirs + ' folders, ' + files + ' files';
      document.getElementById('statusRight').textContent = path;
    } catch (e) {
      document.getElementById('fileList').innerHTML =
        '<tr><td colspan="4"><div class="error-msg">' + escapeHtml(e.message) + '</div></td></tr>';
      document.getElementById('statusLeft').textContent = 'Error loading directory';
    }
  }

  function renderFileList() {
    if (entries.length === 0) {
      document.getElementById('fileList').innerHTML =
        '<tr><td colspan="4"><div class="empty-state"><span class="icon">&#x1F4C2;</span>This folder is empty</div></td></tr>';
      return;
    }

    var html = '';
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      var selected = i === selectedIndex ? ' selected' : '';
      html += '<tr class="' + selected + '" onclick="selectEntry(' + i + ')" ondblclick="openEntry(' + i + ')">';
      html += '<td class="file-row-icon">' + (e.isDirectory ? '📁' : '📄') + '</td>';
      html += '<td class="file-row-name' + (e.isDirectory ? ' dir' : '') + '">' + escapeHtml(e.name) + '</td>';
      html += '<td class="file-row-size">' + (e.isDirectory ? '' : formatSize(e.size)) + '</td>';
      html += '<td class="file-row-date">' + formatDate(e.modified) + '</td>';
      html += '</tr>';
    }
    document.getElementById('fileList').innerHTML = html;
  }

  function selectEntry(index) {
    selectedIndex = index;
    renderFileList();
    showPreview(entries[index]);
  }

  function openEntry(index) {
    var entry = entries[index];
    if (entry.isDirectory) {
      navigateTo(entry.path);
    } else {
      showPreview(entry);
    }
  }

  async function showPreview(entry) {
    var panel = document.getElementById('previewPanel');
    panel.classList.remove('hidden');
    document.getElementById('previewTitle').textContent = entry.name;

    try {
      var statResult = await invoke('fs.stat', { path: entry.path });
      var stat = JSON.parse(statResult);

      var metaHtml = '<table>';
      metaHtml += '<tr><td>Path</td><td>' + escapeHtml(stat.path) + '</td></tr>';
      metaHtml += '<tr><td>Size</td><td>' + formatSize(stat.size) + '</td></tr>';
      metaHtml += '<tr><td>Created</td><td>' + formatDate(stat.created) + '</td></tr>';
      metaHtml += '<tr><td>Modified</td><td>' + formatDate(stat.modified) + '</td></tr>';
      metaHtml += '<tr><td>Accessed</td><td>' + formatDate(stat.accessed) + '</td></tr>';
      metaHtml += '<tr><td>Type</td><td>' + (stat.isDirectory ? 'Directory' : 'File') + '</td></tr>';
      metaHtml += '</table>';
      document.getElementById('previewMeta').innerHTML = metaHtml;
    } catch (e) {
      document.getElementById('previewMeta').innerHTML =
        '<span style="color:var(--red)">Could not load metadata</span>';
    }

    if (!entry.isDirectory) {
      var ext = entry.name.split('.').pop().toLowerCase();
      var textExts = ['txt','md','json','js','ts','css','html','xml','csv','yaml','yml',
                      'toml','ini','cfg','conf','sh','bash','zsh','py','rb','rs','go',
                      'java','kt','swift','cs','fs','cpp','c','h','hpp','lua','sql',
                      'log','env','gitignore','editorconfig','csproj','sln','slnx','props',
                      'targets','jsx','tsx','vue','svelte','astro','dockerfile','makefile'];

      if (entry.size > 512 * 1024) {
        document.getElementById('previewContent').textContent = 'File too large to preview (' + formatSize(entry.size) + ')';
      } else if (textExts.indexOf(ext) !== -1 || entry.name.startsWith('.')) {
        try {
          var content = await invoke('fs.readTextFile', { path: entry.path });
          document.getElementById('previewContent').textContent = content;
        } catch (e) {
          document.getElementById('previewContent').textContent = 'Could not read file: ' + e.message;
        }
      } else {
        document.getElementById('previewContent').textContent = 'Binary file (' + ext + ') - preview not available';
      }
    } else {
      document.getElementById('previewContent').textContent = '';
    }
  }

  function closePreview() {
    document.getElementById('previewPanel').classList.add('hidden');
    selectedIndex = -1;
    renderFileList();
  }

  function goUp() {
    if (!currentPath || currentPath === '/') return;
    var parts = currentPath.split('/').filter(function(p) { return p.length > 0; });
    parts.pop();
    navigateTo('/' + parts.join('/'));
  }

  function goHome() {
    navigateTo(homePath || '/');
  }

  function refresh() {
    navigateTo(currentPath);
  }

  // Detect Ryn and initialize
  var homePath = '';

  function init() {
    if (window.__ryn && window.__ryn.invoke) {
      isRynAvailable = true;
      // The host (Program.cs) injects the real home directory at startup.
      homePath = '__RYN_HOME__';
      navigateTo(homePath);
    } else {
      document.getElementById('fileList').innerHTML =
        '<tr><td colspan="4"><div class="empty-state">' +
        '<span class="icon">&#x26A0;</span>' +
        '<strong>Not running inside Ryn</strong>' +
        '<span>Launch this app with the Ryn runtime to browse files.</span>' +
        '</div></td></tr>';
      document.getElementById('statusLeft').textContent = 'Ryn bridge not available';
      updateBreadcrumb('/');
    }
  }

  // Wait for Ryn bridge or fallback
  if (window.__ryn) {
    init();
  } else {
    // Give the bridge a moment to initialize
    setTimeout(function() { init(); }, 200);
  }
</script>
</body>
</html>
